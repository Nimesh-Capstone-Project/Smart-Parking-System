apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-parking-dev-mongo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://github.com/Nimesh-Capstone-Project/Smart-Parking-System.git
    targetRevision: master
    path: infra/helm
    helm:
      valueFiles:
        - values/mongo.yaml
      values: |
        namespace: dev
        authService:
          enabled: false
        bookingService:
          enabled: false
        frontend:
          enabled: false
        gatewayApi:
          gateway:
            enabled: false
          httpRoute:
            enabled: false
        mongo:
          storageClass:
            enabled: false
        notificationService:
          enabled: false
        parkingService:
          enabled: false
        paymentService:
          enabled: false
        schedulerService:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

