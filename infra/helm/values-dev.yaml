    type: ClusterIP

frontend:
  configMap:
    name: frontend-configmap
    data:
      VITE_AUTH_SERVICE_URL: "/auth"
      VITE_PARKING_SERVICE_URL: "/parking"
      VITE_BOOKING_SERVICE_URL: "/booking"
      VITE_PAYMENT_SERVICE_URL: "/payment"
      VITE_NOTIFICATION_SERVICE_URL: "/notification"
      VITE_RAZORPAY_KEY_ID: "rzp_test_ShFFMxa9JkqmZu"
  deployment:
    name: frontend-deploy
    replicas: 2
    selectorLabels:
      app: sps-frontend
    podLabels:
      app: sps-frontend
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 1
    containers:
      - name: frontend-container
        image:
          repository: nimeshsv814/frontend
          tag: v1.1.3
        ports:
          - containerPort: 80
        envFromConfigMaps:
          - frontend-configmap
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
  service:
    name: frontend-svc
    selectorLabels:
      app: sps-frontend
    ports:
      - port: 80
        targetPort: 80
    type: ClusterIP

gatewayApi:
  gateway:
    name: sps-gateway
    gatewayClassName: kgateway
    listeners:
      - name: http
        protocol: HTTP
        port: 80
        allowedRoutes:
          namespaces:
            from: Same
  httpRoute:
    name: sps-route
    parentRefs:
      - name: sps-gateway
        sectionName: http
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /auth
        filters:
          - type: URLRewrite
            urlRewrite:
              path:
                type: ReplacePrefixMatch
                replacePrefixMatch: /
        backendRefs:
          - name: auth-service
            port: 80
      - matches:
          - path:
              type: PathPrefix
              value: /parking
        filters:
          - type: URLRewrite
            urlRewrite:
              path:
                type: ReplacePrefixMatch
                replacePrefixMatch: /
        backendRefs:
          - name: parking-service
            port: 80
      - matches:
          - path:
              type: PathPrefix
              value: /booking
        filters:
          - type: URLRewrite
            urlRewrite:
              path:
                type: ReplacePrefixMatch
                replacePrefixMatch: /
        backendRefs:
          - name: booking-service
            port: 80
      - matches:
          - path:
              type: PathPrefix
              value: /payment
        filters:
          - type: URLRewrite
            urlRewrite:
              path:
                type: ReplacePrefixMatch
                replacePrefixMatch: /
        backendRefs:
          - name: payment-service
            port: 80
      - matches:
          - path:
              type: PathPrefix
              value: /notification
        filters:
          - type: URLRewrite
            urlRewrite:
              path:
                type: ReplacePrefixMatch
                replacePrefixMatch: /
        backendRefs:
          - name: notification-service
            port: 80
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - name: frontend-svc
            port: 80

mongo:
  storageClass:
    name: storage
    provisioner: nfs.csi.k8s.io
    parameters:
      server: 172.31.28.137
      share: /var/nfs/general/Smart-Parking
  statefulSet:
    name: mongo-deploy
    replicas: 2
    minReadySeconds: 10
    selectorLabels:
      app: sps-mongo
    podLabels:
      app: sps-mongo
    terminationGracePeriodSeconds: 10
    containers:
      - name: mongodb-cont
        image:
          repository: mongo
          tag: ""
        ports:
          - containerPort: 27017
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
        volumeMounts:
          - name: mongo-vct
            mountPath: /data/db
    volumeClaimTemplates:
      - metadata:
          name: mongo-vct
        spec:
          accessModes:
            - ReadWriteMany
          storageClassName: storage
          resources:
            requests:
              storage: 2Gi
  service:
    name: mongo-svc
    selectorLabels:
      app: sps-mongo
    ports:
      - port: 27017
        targetPort: 27017
    type: ClusterIP
    clusterIP: None

