{{- $namespace := default .Release.Namespace .Values.namespace -}}
{{- $httpRoute := .Values.gatewayApi.httpRoute -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $httpRoute.name }}
  namespace: {{ $namespace }}
spec:
  parentRefs:
{{ toYaml $httpRoute.parentRefs | nindent 4 }}
  rules:
{{ toYaml $httpRoute.rules | nindent 4 }}
