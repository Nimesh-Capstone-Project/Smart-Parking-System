namespace: sps-ns

configMap:
  name: auth-configmap
  data:
    PORT: "4001"
    MONGO_URI: "mongodb://mongo-svc:27017/authdb"
    JWT_SECRET: "smartparking_super_secret"
    JWT_EXPIRES_IN: "7d"
    CORS_ORIGIN: "*"
    SEED_ADMIN_EMAIL: "admin@parking.com"
    SEED_ADMIN_PASSWORD: "Admin@123"
    SEED_USER_EMAIL: "user@parking.com"
    SEED_USER_PASSWORD: "User@123"

deployment:
  name: auth-deploy
  replicas: 2
  selectorLabels:
    app: sps-auth
  podLabels:
    app: sps-auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  containers:
    - name: auth-container
      image:
        repository: nimeshsv814/auth-service
        tag: v1.0.0
      ports:
        - containerPort: 4001
      envFromConfigMaps:
        - auth-configmap
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "200m"
          memory: "512Mi"

service:
  name: auth-service
  selectorLabels:
    app: sps-auth
  ports:
    - port: 80
      targetPort: 4001
  type: ClusterIP
