apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deploy
  namespace: sps-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sps-notification
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sps
    spec:
      containers:
        - name: notification-container
          image: nimeshsv814/notification-service:v1.0.0
          ports:
            - containerPort: 4006
          envFrom:
            - configMapRef:
                name: notification-configmap
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"