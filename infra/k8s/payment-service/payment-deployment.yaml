apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deploy
  namespace: sps-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sps-payment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sps-payment
    spec:
      containers:
        - name: payment-container
          image: nimeshsv814/payment-service:v1.0.0
          ports:
            - containerPort: 4004
          envFrom:
            - configMapRef:
                name: payment-configmap
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"