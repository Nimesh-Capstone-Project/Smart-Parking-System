apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sps-route
  namespace: sps-ns
spec:
  parentRefs:
    - name: sps-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: auth-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /parking
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: parking-svc
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /booking
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: booking-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /payment
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: payment-svc
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /notification
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: notification-svc
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-svc
          port: 80
